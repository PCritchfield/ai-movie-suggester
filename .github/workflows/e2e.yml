name: E2E

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E — Playwright (Chromium + Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip draft PRs, always run on manual dispatch
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # -----------------------------------------------------------------------
      # Node setup (matches ci.yml pattern)
      # -----------------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Playwright browser cache + install
      # (--with-deps installs OS-level packages not covered by the npm cache)
      # -----------------------------------------------------------------------
      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # -----------------------------------------------------------------------
      # Pre-pull Docker images (globalSetup manages Compose lifecycle;
      # pre-pulling warms the image cache so 'up -d' is faster)
      # -----------------------------------------------------------------------
      - name: Pre-pull Docker images
        working-directory: .
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml pull
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Run E2E tests (globalSetup starts Docker Compose and writes .env.e2e)
      # -----------------------------------------------------------------------
      - name: Run Playwright tests
        run: npx playwright test --project=chromium --project=firefox

      # -----------------------------------------------------------------------
      # Artifacts on failure (never upload .auth/ — contains session cookies)
      # -----------------------------------------------------------------------
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Cleanup — tear down Compose even on failure
      # -----------------------------------------------------------------------
      - name: Cleanup Docker Compose
        if: always()
        working-directory: .
        run: docker compose -p ai-movie-suggester-e2e down -v || true
