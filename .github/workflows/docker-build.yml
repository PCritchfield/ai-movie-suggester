name: Docker Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/Dockerfile"
      - "backend/**"
      - "frontend/Dockerfile"
      - "frontend/**"
      - "docker-compose*.yml"

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ai-movie-suggester-backend:ci

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ai-movie-suggester-frontend:ci
